# k8s/overlays/production/kustomization.yaml
# Production overlay for frontend-service.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace harus sinkron dengan base frontend
namespace: frontend-service

resources:
  - ../../base

# ── Image: Gunakan tag semver yang spesifik di production ───────────────────
# JANGAN gunakan :latest — selalu gunakan tag immutable agar deployment terprediksi
images:
  - name: registry.yourdomain.com/frontend-microservice
    newTag: "1.0.0"

# ── Patches ───────────────────────────────────────────────────────────────────
patches:
  # Tingkatkan replika dan perketat limit resource untuk produksi
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend-service
        namespace: frontend-service
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: frontend-service
                resources:
                  requests:
                    cpu:    "200m"
                    memory: "256Mi"
                  limits:
                    cpu:    "1000m"
                    memory: "512Mi"

  # Rentang HPA yang lebih lebar untuk menangani lonjakan trafik user
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: frontend-service-hpa
        namespace: frontend-service
      spec:
        minReplicas: 3
        maxReplicas: 20

# ── Production-specific config overrides ─────────────────────────────────────
configMapGenerator:
  - name: frontend-service-config
    namespace: frontend-service
    behavior: merge
    literals:
      - NODE_ENV=production
      - SERVICE_VERSION=1.0.0
