# k8s/overlays/production/dashboard-service/kustomization.yaml
# Production overlay for dashboard-microservice.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace harus sesuai dengan base dashboard
namespace: dashboard-service

resources:
  - ../../../base/dashboard-service

# ── Image: Gunakan tag semver yang spesifik di production ───────────────────
# Selalu gunakan tag immutable (bukan :latest) untuk konsistensi deployment
images:
  - name: registry.yourdomain.com/dashboard-microservice
    newTag: "1.0.0"

# ── Patches ───────────────────────────────────────────────────────────────────
patches:
  # Meningkatkan replika dan alokasi resource untuk performa stabil
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dashboard-service
        namespace: dashboard-service
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: dashboard-service
                resources:
                  requests:
                    cpu:    "200m"
                    memory: "256Mi"
                  limits:
                    cpu:    "1000m"
                    memory: "512Mi"

  # Konfigurasi HPA agar dashboard bisa diskalakan saat beban admin tinggi
  - patch: |-
      apiVersion: autoscaling/v2
      kind: HorizontalPodAutoscaler
      metadata:
        name: dashboard-service-hpa
        namespace: dashboard-service
      spec:
        minReplicas: 3
        maxReplicas: 20

# ── Production-specific config overrides ─────────────────────────────────────
configMapGenerator:
  - name: dashboard-service-config
    namespace: dashboard-service
    behavior: merge
    literals:
      - NODE_ENV=production
      - SERVICE_VERSION=1.0.0
      - CACHE_ENABLED=true
