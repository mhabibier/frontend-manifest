# k8s/base/dashboard-service/configmap.yaml
# Configuration for the Dashboard microservice.

apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-service-config
  namespace: dashboard-service
  labels:
    app.kubernetes.io/name: dashboard-microservice
    app.kubernetes.io/component: config
data:
  PORT: "3000"
  NODE_ENV: "production"
  SERVICE_NAME: "dashboard-microservice"
  SERVICE_VERSION: "1.0.0"

  # ── API Endpoints (DNS internal cluster) ──────────────────────────────────
  # Dashboard memerlukan akses ke semua service untuk agregasi data
  AUTH_API_URL: "http://auth-service.auth-service.svc.cluster.local:3000"
  ORDER_API_URL: "http://order-service.order-service.svc.cluster.local:3000"
  BOOK_API_URL: "http://book-service.book-service.svc.cluster.local:3000"
  PAYMENT_API_URL: "http://payment-service.payment-service.svc.cluster.local:3000"

  # Tambahan: Endpoint untuk Dashboard jika perlu memantau node blockchain
  BLOCKCHAIN_API_URL: "http://blockchain-node.blockchain-network.svc.cluster.local:8545"

  # ── Observability (Monitoring Stack) ──────────────────────────────────────
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4317"
  LOKI_HOST: "http://loki.monitoring.svc.cluster.local:3100"
