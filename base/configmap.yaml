apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-service-config
  namespace: frontend-service
  labels:
    app.kubernetes.io/name: frontend-microservice
    app.kubernetes.io/component: config
data:
  PORT: "3000"
  NODE_ENV: "production"
  SERVICE_NAME: "frontend-microservice"
  SERVICE_VERSION: "1.0.0"

  # ── API Endpoints (Ganti sesuai DNS internal cluster Anda) ────────────────
  # Frontend perlu tahu ke mana harus mengirim request
  AUTH_API_URL: "http://auth-service.auth-service.svc.cluster.local:3000"
  ORDER_API_URL: "http://order-service.order-service.svc.cluster.local:3000"
  BOOK_API_URL: "http://book-service.book-service.svc.cluster.local:3000"
  PAYMENT_API_URL: "http://payment-service.payment-service.svc.cluster.local:3000"

  # ── Observability (Monitoring Stack) ──────────────────────────────────────
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4317"
  LOKI_HOST: "http://loki.monitoring.svc.cluster.local:3100"
