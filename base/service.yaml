apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: auth-service
  labels:
    app.kubernetes.io/name:      auth-microservice
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app: auth-service   # Must match pod template labels in Deployment
  ports:
    - name: http
      port: 80          # Cluster-internal port clients connect to
      targetPort: http        # Named port on the pod (containerPort: 3000)
      protocol: TCP

