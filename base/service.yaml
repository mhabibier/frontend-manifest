# k8s/base/dashboard-service/service.yaml
# Internal load balancer for dashboard-microservice.

apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: dashboard-service
  labels:
    app.kubernetes.io/name: dashboard-microservice
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    app: dashboard-service # Harus cocok dengan label pada Deployment dashboard
  ports:
    - name: http
      port: 80 # Port yang diakses oleh layanan lain dalam cluster
      targetPort: http # Merujuk ke containerPort: 3000 pada Pod
      protocol: TCP
