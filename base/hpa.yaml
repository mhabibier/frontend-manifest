apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-service-hpa
  namespace: frontend-service
  labels:
    app.kubernetes.io/name: frontend-microservice
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-service
  minReplicas: 2 # Menjaga ketersediaan tinggi (High Availability)
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # Tambah pod jika rata-rata CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80 # Tambah pod jika rata-rata RAM > 80%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30 # Bereaksi cepat terhadap lonjakan trafik (30 detik)
      policies:
        - type: Pods
          value: 2 # Maksimal tambah 2 pod setiap kali scale-up
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300 # Tunggu 5 menit sebelum scale-down (mencegah flapping)
      policies:
        - type: Pods
          value: 1 # Hapus maksimal 1 pod setiap menit
          periodSeconds: 60
