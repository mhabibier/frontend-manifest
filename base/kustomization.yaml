# k8s/base/dashboard-service/kustomization.yaml
# Base kustomization for dashboard-microservice.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace untuk isolasi seluruh komponen dashboard
namespace: dashboard-service

resources:
  - namespace.yaml
  - sa.yaml
  - registry-secret.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml

# Menyuntikkan label standar ke semua resource secara otomatis
commonLabels:
  app.kubernetes.io/name: dashboard-microservice
  app.kubernetes.io/managed-by: kustomize
